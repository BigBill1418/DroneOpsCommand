# docker-compose.standby.yml — PostgreSQL streaming replication standby
# Runs on HSH-HQ (10.99.0.1) to maintain a hot standby of the DroneOps
# primary database running on CHAD-HQ (10.99.0.2:5434).
#
# Usage:
#   docker compose -f docker-compose.standby.yml up -d
#
# First-time setup requires pg_basebackup (see scripts/init-standby.sh).

services:
  db-standby:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGDATA: /var/lib/postgresql/data
      # ADR-0012: required, no default. Substituted into primary_conninfo below.
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:?REPLICATION_PASSWORD must be set in .env (no default — see ADR-0012)}
    volumes:
      - droneops_standby_pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    # primary_conninfo is interpolated by docker compose at start time. The
    # password literal that used to live here was removed in ADR-0012.
    command: >
      postgres
        -c hot_standby=on
        -c primary_conninfo='host=10.99.0.2 port=5434 user=replicator password=${REPLICATION_PASSWORD:?REPLICATION_PASSWORD must be set} application_name=hsh_hq_standby'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U replicator || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  droneops_standby_pgdata:
    external: true
    name: droneops_standby_pgdata
