# Pre-commit hooks for DroneOpsCommand (ADR-0012).
#
# Bootstrap once per clone:
#   pip install pre-commit && pre-commit install
#
# What runs on every `git commit`:
#   - gitleaks (secret detection on the staged diff)
#   - basic file hygiene (trailing whitespace, EOL, large files)
#
# Fast path: gitleaks only scans the staged content, so the hook adds
# <1s to a typical commit. CI re-scans the full tree on every push/PR via
# .github/workflows/secret-scan.yml — that's the authoritative gate.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        # `protect --staged` only scans what's about to be committed.
        # Custom config is honored automatically when .gitleaks.toml is at repo root.
        args: ["protect", "--staged", "--no-banner"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key
      - id: check-yaml
        args: ["--allow-multiple-documents"]
        # docker compose files use !reset/!override custom tags that PyYAML rejects.
        exclude: "^(docker-compose.*\\.yml|.*/docker-compose.*\\.yml)$"
