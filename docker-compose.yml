services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-doc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-doc}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-doc}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      # Keep model loaded in RAM permanently (64GB available)
      - OLLAMA_KEEP_ALIVE=-1
      # Single-request mode — all CPU goes to one generation
      - OLLAMA_NUM_PARALLEL=1
      # Only keep one model loaded (saves RAM for the model itself)
      - OLLAMA_MAX_LOADED_MODELS=1
      # Enable flash attention for faster inference
      - OLLAMA_FLASH_ATTENTION=1
    # Pin 6 of 8 hardware threads — leaves 2 for OS, DB, and other services
    cpuset: "0-5"
    mem_reservation: 8g

  ollama-setup:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_started
    restart: "no"
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama to be ready...' &&
        until curl -s http://ollama:11434/api/tags > /dev/null 2>&1; do sleep 2; done &&
        echo 'Pulling Mistral model...' &&
        curl -s http://ollama:11434/api/pull -d '{\"name\": \"mistral:7b-instruct-v0.3-q4_K_M\"}' &&
        echo 'Model pulled. Will load into RAM on first use.'
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://doc:changeme_in_production@db:5432/doc}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral:7b-instruct-v0.3-q4_K_M}
      - OPENDRONELOG_URL=${OPENDRONELOG_URL:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-changeme_generate_a_random_secret}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-30}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme_in_production}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - UPLOAD_DIR=/data/uploads
      - REPORTS_DIR=/data/reports
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3080}
    volumes:
      - app_data:/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_tasks worker --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://doc:changeme_in_production@db:5432/doc}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral:7b-instruct-v0.3-q4_K_M}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - UPLOAD_DIR=/data/uploads
      - REPORTS_DIR=/data/reports
    volumes:
      - app_data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  flight-parser:
    build:
      context: ./flight-parser
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DJI_API_KEY=${DJI_API_KEY:-}
      - PARSER_PORT=8100

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3080}:8080"
    depends_on:
      - backend

  # ── Cloudflare Tunnel ─────────────────────────────────────────────
  # Exposes the app securely without opening router ports.
  # Set CLOUDFLARE_TUNNEL_TOKEN in .env — service is a no-op without it.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  ollama_data:
  app_data:
