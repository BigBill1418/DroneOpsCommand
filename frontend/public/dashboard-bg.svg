<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#050608"/>
    </radialGradient>
    <!-- Drone body -->
    <linearGradient id="droneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3ad4ff"/>
      <stop offset="100%" stop-color="#0088bb"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Drone illustration -->
  <g transform="translate(400,160)" opacity="0.35">
    <!-- Arms -->
    <line x1="-90" y1="-10" x2="-40" y2="5" stroke="url(#droneGrad)" stroke-width="5" stroke-linecap="round"/>
    <line x1="90" y1="-10" x2="40" y2="5" stroke="url(#droneGrad)" stroke-width="5" stroke-linecap="round"/>

    <!-- Propeller discs -->
    <ellipse cx="-95" cy="-15" rx="45" ry="6" fill="#3ad4ff" opacity="0.3"/>
    <ellipse cx="95" cy="-15" rx="45" ry="6" fill="#3ad4ff" opacity="0.3"/>

    <!-- Propeller blades -->
    <line x1="-140" y1="-15" x2="-50" y2="-15" stroke="#3ad4ff" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="50" y1="-15" x2="140" y2="-15" stroke="#3ad4ff" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

    <!-- Motor housings -->
    <circle cx="-95" cy="-12" r="7" fill="url(#droneGrad)"/>
    <circle cx="95" cy="-12" r="7" fill="url(#droneGrad)"/>

    <!-- Body -->
    <rect x="-35" y="-8" width="70" height="25" rx="10" fill="url(#droneGrad)"/>

    <!-- Camera gimbal -->
    <rect x="-8" y="17" width="16" height="10" rx="3" fill="#0088bb"/>
    <circle cx="0" cy="30" r="8" fill="#006690" stroke="#3ad4ff" stroke-width="1.5"/>
    <circle cx="0" cy="30" r="4" fill="#0a1628"/>

    <!-- Landing gear -->
    <line x1="-30" y1="17" x2="-40" y2="40" stroke="#0088bb" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="17" x2="40" y2="40" stroke="#0088bb" stroke-width="3" stroke-linecap="round"/>
    <line x1="-50" y1="40" x2="-30" y2="40" stroke="#0088bb" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="40" x2="50" y2="40" stroke="#0088bb" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- BarnardHQ text -->
  <text x="400" y="290" text-anchor="middle" font-family="Arial Black, Helvetica, sans-serif" font-size="56" font-weight="900" letter-spacing="3" opacity="0.25">
    <tspan fill="#e8edf2">Barnard</tspan><tspan fill="#00d4ff">HQ</tspan>
  </text>

  <!-- Subtitle -->
  <text x="400" y="320" text-anchor="middle" font-family="monospace" font-size="14" fill="#5a6478" letter-spacing="5" opacity="0.25">
    PROFESSIONAL AERIAL OPERATIONS
  </text>
</svg>
