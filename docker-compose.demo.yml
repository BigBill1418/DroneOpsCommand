# Docker Compose override for demo instance (command-demo.barnardhq.com)
#
# Usage from /opt/droneops-demo/:
#   docker compose -p droneops-demo -f docker-compose.yml -f docker-compose.demo.yml --env-file .env.demo up -d --build
#
# Phase-5 observability note: this override pins `com.barnardhq.env=demo`
# on every label and the Alloy OTLP endpoint to CHAD-HQ's local collector
# (10.99.0.2). Alloy on CHAD-HQ then cascades to the HSH-HQ plane over
# WireGuard — keeps the demo host's spans/logs off the WG wire unless
# they need to be correlated with prod.

x-barnardhq-labels-demo: &barnardhq-labels-demo
  com.barnardhq.project: "droneops"
  com.barnardhq.env: "demo"
  com.barnardhq.tenant: "shared"
  com.barnardhq.stack: "droneops-demo"

x-logging-demo: &logging-demo
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"
    labels: "com.barnardhq.service,com.barnardhq.project,com.barnardhq.env,com.barnardhq.tenant,com.barnardhq.stack"

services:
  backend:
    env_file:
      - .env.demo
    environment:
      # ADR-0012: required, no default. The previous literal embedded the demo
      # POSTGRES password directly in the public compose file. Provide via
      # `DATABASE_URL` in `.env.demo` on the demo host (e.g. CHAD-HQ).
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL must be set in .env.demo (no default — see ADR-0012)}
      - DEMO_MODE=true
      - DEMO_RESET_INTERVAL_HOURS=24
      - ADMIN_USERNAME=demo
      - ADMIN_PASSWORD=demo123
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=60
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=1
      - FRONTEND_URL=https://command-demo.barnardhq.com
      # Disable outbound email in demo
      - SMTP_HOST=
      - SMTP_USER=
      - SMTP_PASSWORD=
      # Phase-5 observability — demo pins CHAD-HQ Alloy + env=demo.
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://10.99.0.2:4317}
      - OTEL_SERVICE_NAME=droneops-api
      - ENV=demo
      - SENTRY_ENVIRONMENT=demo
    # Override base port mapping — use 8001 to avoid conflict with prod on 8000
    ports: !override
      - "8001:8000"
    # Remove ollama dependency (it's disabled)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      <<: *barnardhq-labels-demo
      com.barnardhq.service: "droneops-api"
    logging: *logging-demo

  # Disable worker in demo (no Celery tasks needed)
  worker:
    deploy:
      replicas: 0

  # Disable celery beat in demo — silence-watchdog is a prod-only concern.
  beat:
    deploy:
      replicas: 0

  # Demo frontend on port 3081 (prod uses 3080)
  frontend:
    env_file:
      - .env.demo
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: demo
        VITE_APP_VERSION: "2.63.5"
    ports:
      - "3081:8080"
    labels:
      <<: *barnardhq-labels-demo
      com.barnardhq.service: "droneops-frontend"
    logging: *logging-demo

  # Cloudflare tunnel — routes command-demo.barnardhq.com → localhost:3081
  # Uses host network so cloudflared can reach frontend on host port
  # Force HTTP/2 protocol — QUIC is unstable on this host due to small UDP buffers
  # (rmem_max=208KiB, cloudflared wants 7168KiB, causes connection drops)
  # Token is set via CLOUDFLARE_TUNNEL_TOKEN in .env.demo
  cloudflared:
    env_file:
      - .env.demo
    command: tunnel --no-autoupdate --protocol http2 run
    network_mode: host
    restart: unless-stopped
    labels:
      <<: *barnardhq-labels-demo
      com.barnardhq.service: "droneops-cloudflared"
    logging: *logging-demo

  # Disable Ollama in demo (no GPU needed, LLM shows as "offline")
  ollama:
    deploy:
      replicas: 0

  ollama-setup:
    deploy:
      replicas: 0

  # Disable watchtower in demo
  watchtower:
    deploy:
      replicas: 0

  # Override DB port to avoid conflict with DroneOps Command (which uses 5434)
  db:
    env_file:
      - .env.demo
    ports: !override
      - "5435:5432"
    labels:
      <<: *barnardhq-labels-demo
      com.barnardhq.service: "droneops-db"
    logging: *logging-demo
