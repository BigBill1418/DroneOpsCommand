<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <!-- DJI Matrice 4TD - Next-gen enterprise quad -->
  <rect width="200" height="160" rx="8" fill="#050608"/>
  <!-- Arms -->
  <line x1="62" y1="48" x2="32" y2="28" stroke="#1a1f2e" stroke-width="4" stroke-linecap="round"/>
  <line x1="138" y1="48" x2="168" y2="28" stroke="#1a1f2e" stroke-width="4" stroke-linecap="round"/>
  <line x1="62" y1="98" x2="32" y2="118" stroke="#1a1f2e" stroke-width="4" stroke-linecap="round"/>
  <line x1="138" y1="98" x2="168" y2="118" stroke="#1a1f2e" stroke-width="4" stroke-linecap="round"/>
  <!-- Rotors -->
  <ellipse cx="32" cy="28" rx="24" ry="6" fill="#0e1117" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <ellipse cx="168" cy="28" rx="24" ry="6" fill="#0e1117" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <ellipse cx="32" cy="118" rx="24" ry="6" fill="#0e1117" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <ellipse cx="168" cy="118" rx="24" ry="6" fill="#0e1117" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <!-- Body - sleeker design -->
  <path d="M58 55 Q58 42 72 42 L128 42 Q142 42 142 55 L142 95 Q142 108 128 108 L72 108 Q58 108 58 95 Z" fill="#0e1117" stroke="#1a1f2e" stroke-width="1.5"/>
  <!-- Camera array -->
  <rect x="78" y="108" width="44" height="16" rx="4" fill="#1a1f2e"/>
  <circle cx="88" cy="116" r="4" fill="#050608" stroke="#00d4ff" stroke-width="1"/>
  <circle cx="100" cy="116" r="4" fill="#050608" stroke="#e8edf2" stroke-width="1"/>
  <circle cx="112" cy="116" r="3" fill="#050608" stroke="#ff6b1a" stroke-width="1"/>
  <!-- Top module -->
  <rect x="88" y="36" width="24" height="6" rx="3" fill="#1a1f2e"/>
  <!-- Status LED -->
  <circle cx="100" cy="68" r="3" fill="#00d4ff" opacity="0.8"/>
  <!-- Label -->
  <text x="100" y="148" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5a6478" letter-spacing="1">MATRICE 4TD</text>
