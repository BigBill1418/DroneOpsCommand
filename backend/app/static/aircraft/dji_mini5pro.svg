<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <!-- DJI Mini 5 Pro - Ultra-compact sub-250g -->
  <rect width="200" height="160" rx="8" fill="#050608"/>
  <!-- Arms - small compact -->
  <line x1="72" y1="58" x2="48" y2="42" stroke="#1a1f2e" stroke-width="3" stroke-linecap="round"/>
  <line x1="128" y1="58" x2="152" y2="42" stroke="#1a1f2e" stroke-width="3" stroke-linecap="round"/>
  <line x1="72" y1="92" x2="48" y2="108" stroke="#1a1f2e" stroke-width="3" stroke-linecap="round"/>
  <line x1="128" y1="92" x2="152" y2="108" stroke="#1a1f2e" stroke-width="3" stroke-linecap="round"/>
  <!-- Rotors - smaller -->
  <ellipse cx="48" cy="42" rx="18" ry="4" fill="#0e1117" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <ellipse cx="152" cy="42" rx="18" ry="4" fill="#0e1117" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <ellipse cx="48" cy="108" rx="18" ry="4" fill="#0e1117" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <ellipse cx="152" cy="108" rx="18" ry="4" fill="#0e1117" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <!-- Body - tiny and compact -->
  <rect x="68" y="52" width="64" height="42" rx="8" fill="#0e1117" stroke="#1a1f2e" stroke-width="1.5"/>
  <!-- Camera gimbal -->
  <rect x="90" y="94" width="20" height="10" rx="3" fill="#1a1f2e"/>
  <circle cx="100" cy="99" r="4" fill="#050608" stroke="#00d4ff" stroke-width="1"/>
  <!-- Sub-250g badge -->
  <rect x="80" y="60" width="40" height="10" rx="5" fill="#050608" stroke="#5a6478" stroke-width="0.5"/>
  <text x="100" y="68" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#5a6478">&lt;250g</text>
  <!-- Status LED -->
  <circle cx="100" cy="80" r="2" fill="#00d4ff" opacity="0.8"/>
  <!-- Label -->
  <text x="100" y="148" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5a6478" letter-spacing="1">MINI 5 PRO</text>
</svg>