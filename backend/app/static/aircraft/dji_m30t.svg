<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <!-- DJI Matrice 30T - Enterprise quad with thermal -->
  <rect width="200" height="160" rx="8" fill="#050608"/>
  <!-- Arms -->
  <line x1="60" y1="50" x2="30" y2="30" stroke="#1a1f2e" stroke-width="4" stroke-linecap="round"/>
  <line x1="140" y1="50" x2="170" y2="30" stroke="#1a1f2e" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="100" x2="30" y2="120" stroke="#1a1f2e" stroke-width="4" stroke-linecap="round"/>
  <line x1="140" y1="100" x2="170" y2="120" stroke="#1a1f2e" stroke-width="4" stroke-linecap="round"/>
  <!-- Rotors -->
  <ellipse cx="30" cy="30" rx="22" ry="6" fill="#0e1117" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <ellipse cx="170" cy="30" rx="22" ry="6" fill="#0e1117" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <ellipse cx="30" cy="120" rx="22" ry="6" fill="#0e1117" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <ellipse cx="170" cy="120" rx="22" ry="6" fill="#0e1117" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <!-- Body -->
  <rect x="55" y="45" width="90" height="60" rx="12" fill="#0e1117" stroke="#1a1f2e" stroke-width="1.5"/>
  <!-- Camera/Thermal gimbal -->
  <rect x="82" y="105" width="36" height="18" rx="4" fill="#1a1f2e"/>
  <circle cx="93" cy="114" r="5" fill="#050608" stroke="#00d4ff" stroke-width="1"/>
  <circle cx="107" cy="114" r="4" fill="#050608" stroke="#ff6b1a" stroke-width="1"/>
  <!-- Top sensors -->
  <rect x="90" y="40" width="20" height="5" rx="2" fill="#1a1f2e"/>
  <!-- Status LED -->
  <circle cx="100" cy="70" r="3" fill="#00d4ff" opacity="0.8"/>
  <!-- Label -->
  <text x="100" y="148" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5a6478" letter-spacing="1">MATRICE 30T</text>
</svg>