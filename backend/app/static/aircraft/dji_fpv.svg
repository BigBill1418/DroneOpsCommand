<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <!-- DJI FPV - Racing/freestyle quad -->
  <rect width="200" height="160" rx="8" fill="#050608"/>
  <!-- Arms - aggressive X layout -->
  <line x1="70" y1="52" x2="32" y2="28" stroke="#1a1f2e" stroke-width="4" stroke-linecap="round"/>
  <line x1="130" y1="52" x2="168" y2="28" stroke="#1a1f2e" stroke-width="4" stroke-linecap="round"/>
  <line x1="70" y1="98" x2="32" y2="122" stroke="#1a1f2e" stroke-width="4" stroke-linecap="round"/>
  <line x1="130" y1="98" x2="168" y2="122" stroke="#1a1f2e" stroke-width="4" stroke-linecap="round"/>
  <!-- Rotors -->
  <ellipse cx="32" cy="28" rx="22" ry="5" fill="#0e1117" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <ellipse cx="168" cy="28" rx="22" ry="5" fill="#0e1117" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <ellipse cx="32" cy="122" rx="22" ry="5" fill="#0e1117" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <ellipse cx="168" cy="122" rx="22" ry="5" fill="#0e1117" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <!-- Body - aerodynamic FPV shape -->
  <path d="M65 55 L85 42 L115 42 L135 55 L135 95 L115 108 L85 108 L65 95 Z" fill="#0e1117" stroke="#1a1f2e" stroke-width="1.5"/>
  <!-- Camera -->
  <rect x="88" y="38" width="24" height="10" rx="4" fill="#1a1f2e"/>
  <circle cx="100" cy="43" r="4" fill="#050608" stroke="#00d4ff" stroke-width="1"/>
  <!-- Speed accent lines -->
  <line x1="80" y1="70" x2="90" y2="70" stroke="#ff6b1a" stroke-width="1" opacity="0.6"/>
  <line x1="110" y1="70" x2="120" y2="70" stroke="#ff6b1a" stroke-width="1" opacity="0.6"/>
  <!-- Status LED -->
  <circle cx="100" cy="75" r="2.5" fill="#ff6b1a" opacity="0.8"/>
  <!-- Label -->
  <text x="100" y="148" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5a6478" letter-spacing="1">DJI FPV</text>
</svg>