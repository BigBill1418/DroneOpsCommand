# docker-compose.demo-standby.yml — PostgreSQL streaming replication standby
# Runs on HSH-HQ (10.99.0.1) to maintain a hot standby of the DroneOps Demo
# primary database running on CHAD-HQ (10.99.0.2:5435).
#
# Usage:
#   docker compose -f docker-compose.demo-standby.yml up -d
#
# First-time setup requires pg_basebackup (see scripts/init-demo-standby.sh).
#
# NOTE: explicit project name 'droneops-demo-standby' prevents the default
# 'droneops' project (main compose) from treating this container as an orphan
# and removing it when someone runs `docker compose up -d` in the same dir.
# Discovered 2026-04-15 — main compose was silently wiping this standby.
name: droneops-demo-standby

services:
  db-demo-standby:
    container_name: droneops-db-demo-standby-1
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGDATA: /var/lib/postgresql/data
    volumes:
      - droneops_demo_standby_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5437:5432"
      - "10.99.0.1:5437:5432"
    command: >
      postgres
        -c hot_standby=on
        -c primary_conninfo='host=10.99.0.2 port=5435 user=replicator password=SecureDroneRepl2026 application_name=hsh_hq_demo_standby'
        -c primary_slot_name='hsh_hq_demo_standby'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U doc -d doc || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  droneops_demo_standby_pgdata:
    external: true
    name: droneops_demo_standby_pgdata
