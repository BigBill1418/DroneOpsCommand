<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050608"/>
      <stop offset="100%" stop-color="#0e1117"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="none" stroke="#1a1f2e" stroke-width="2"/>
  <!-- Drone body (top-down view) -->
  <g transform="translate(256,220)">
    <!-- Arms -->
    <line x1="-80" y1="-80" x2="80" y2="80" stroke="url(#glow)" stroke-width="8" stroke-linecap="round"/>
    <line x1="80" y1="-80" x2="-80" y2="80" stroke="url(#glow)" stroke-width="8" stroke-linecap="round"/>
    <!-- Propeller circles -->
    <circle cx="-80" cy="-80" r="36" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.6"/>
    <circle cx="80" cy="-80" r="36" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.6"/>
    <circle cx="-80" cy="80" r="36" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.6"/>
    <circle cx="80" cy="80" r="36" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.6"/>
    <!-- Center body -->
    <rect x="-20" y="-14" width="40" height="28" rx="6" fill="#00d4ff"/>
    <rect x="-12" y="-6" width="24" height="12" rx="3" fill="#050608"/>
  </g>
  <!-- Sync arrows (below drone) -->
  <g transform="translate(256,370)">
    <!-- Circular sync arrows -->
    <path d="M-24,-12 A28,28 0 0,1 24,-12" fill="none" stroke="#e8edf2" stroke-width="4" stroke-linecap="round"/>
    <polygon points="24,-12 18,-22 30,-18" fill="#e8edf2"/>
    <path d="M24,12 A28,28 0 0,1 -24,12" fill="none" stroke="#e8edf2" stroke-width="4" stroke-linecap="round"/>
    <polygon points="-24,12 -18,22 -30,18" fill="#e8edf2"/>
  </g>
  <!-- SYNC text -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" letter-spacing="8" fill="#5a6478">SYNC</text>
</svg>
