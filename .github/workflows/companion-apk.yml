name: Build DroneOpsSync companion APK

on:
  push:
    branches: [main]
    paths:
      - 'companion/**'
      - '.github/workflows/companion-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: [self-hosted, linux, x64, bos]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: companion/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-33 build-tools;33.0.2'

      - name: Read companion version
        id: version
        working-directory: companion
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        working-directory: companion
        run: npm ci

      - name: Build web bundle
        working-directory: companion
        run: npm run build

      - name: Add Android platform
        working-directory: companion
        run: npx cap add android

      - name: Copy web bundle into Android project
        working-directory: companion
        run: npx cap copy android

      - name: Patch Android project (targetSdk 29, FileScanner, manifest)
        working-directory: companion
        run: node scripts/patch-android.cjs

      - name: Build debug APK (auto-signed for easy install)
        working-directory: companion/android
        run: ./gradlew assembleDebug

      - name: Rename APK
        working-directory: companion
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "artifacts/DroneOpsSync-${VERSION}.apk"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: DroneOpsSync-${{ steps.version.outputs.version }}
          path: companion/artifacts/*.apk
          if-no-files-found: error

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: companion-v${{ steps.version.outputs.version }}
          name: DroneOpsSync v${{ steps.version.outputs.version }}
          body: |
            DroneOpsSync companion app build for DroneOpsCommand v${{ steps.version.outputs.version }}.

            **Install:** Download the `.apk`, sideload onto your DJI controller / phone,
            open the app, and enter your DroneOpsCommand server URL + device API key
            in Settings.

            Debug-signed — safe to install directly, no Play Store required.
          files: companion/artifacts/*.apk
          fail_on_unmatched_files: true
          make_latest: false
